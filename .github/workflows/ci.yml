name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  docker:
    name: Docker integration test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          docker compose up \
            --build \
            --abort-on-container-exit \
            --exit-code-from test
